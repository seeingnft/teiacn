<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Language" content="zh-CN" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=1" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png?v=1" />
    <link rel="manifest" href="/icons/site.webmanifest?v=1" />
    <link rel="shortcut icon" href="/icons/favicon.ico?v=1" />
    <meta name="build-commit" content="<%=BUILD_COMMIT%>" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Teia 中文画廊" />
    <meta property="og:title" content="Teia 中文画廊" />
    <meta property="og:type" content="website" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teia 中文画廊</title>
    <script>
      if (typeof globalThis.process === 'undefined') {
        globalThis.process = { env: {}, browser: true };
      }
      if (!globalThis.process.hrtime) {
        globalThis.process.hrtime = function(start) {
          var now = performance.now() * 1e-3;
          var sec = Math.floor(now);
          var nano = Math.floor((now % 1) * 1e9);
          if (start) { sec -= start[0]; nano -= start[1]; if (nano < 0) { sec--; nano += 1e9; } }
          return [sec, nano];
        };
        globalThis.process.hrtime.bigint = function() { return BigInt(Math.floor(performance.now() * 1e6)); };
      }
      window.addEventListener('error', function(e) {
        var d = document.getElementById('js-err');
        if (d) d.innerHTML = '<b>错误:</b> ' + e.message + '<br>' + (e.filename||'').split('/assets/').pop() + ':' + e.lineno;
      });
      window.addEventListener('unhandledrejection', function(e) {
        var d = document.getElementById('js-err');
        if (d) d.innerHTML = '<b>Promise错误:</b> ' + (e.reason && e.reason.message || String(e.reason));
      });
    </script>
  </head>
  <body>
    <noscript style="display:block;padding:20px">请开启 JavaScript</noscript>
    <div id="root"><div id="js-err" style="padding:20px;font-family:sans-serif">正在加载…</div></div>
    <script type="module" src="/src/node_polyfill.js"></script>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
